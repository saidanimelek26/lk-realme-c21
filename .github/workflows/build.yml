name: Build LK Bootloader

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lk-build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout sources
      uses: actions/checkout@v4

    - name: Install Python 2
      run: |
        sudo apt-get update
        sudo apt-get install -y python2
        sudo ln -s /usr/bin/python2 /usr/local/bin/python
        python --version

    - name: Install dependencies
      run: |
        sudo apt-get install -y device-tree-compiler

    - name: Cache GCC toolchain
      id: cache-gcc
      uses: actions/cache@v4
      with:
        path: ~/gcc-toolchain
        key: gcc-toolchain

    - name: Download GCC toolchain
      if: steps.cache-gcc.outputs.cache-hit != 'true'
      run: |
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 ~/gcc-toolchain
        cd ~/gcc-toolchain
        git checkout e9b2ab0932573a0ca90cad11ab75d9619f19c458

    - name: Build LK
      run: |
        export python=python2
        TOOLCHAIN_PREFIX=~/gcc-toolchain/bin/arm-linux-androideabi- make k65v1_64_bsp

    - name: Show build output
      run: ls -lh build-k65v1_64_bsp/

    - name: Create dtb.cfg file
      run: |
        echo "NAME = lk_main_dtb" > dtb.cfg
        cat dtb.cfg

    - name: Check DTB file
      run: |
        if [ -f dtb/realme_c21_lk.dtb ]; then
          echo "✅ DTB file found"
          ls -lh dtb/realme_c21_lk.dtb
        else
          echo "❌ DTB file not found"
          exit 1
        fi

    - name: Create MediaTek DTB header using Python
      run: |
        python3 << 'EOF'
        import struct
        import os
        
        # Read the DTB file
        with open("dtb/realme_c21_lk.dtb", "rb") as f:
            dtb_data = f.read()
        
        print(f"DTB size: {len(dtb_data)} bytes")
        
        # MediaTek header structure (32 bytes):
        # - 16 bytes: name (null-padded)
        # - 4 bytes: version? (optional)
        # - 12 bytes: reserved/zeros
        
        # Create the header with the correct name
        name = "lk_main_dtb"
        header = bytearray(32)
        
        # Write the name (max 16 bytes)
        name_bytes = name.encode('ascii')
        header[0:len(name_bytes)] = name_bytes
        
        # The rest of the header remains zeros
        
        # Combine header + DTB
        dtb_with_header = bytes(header) + dtb_data
        
        print(f"Header size: 32 bytes")
        print(f"Total package size: {len(dtb_with_header)} bytes")
        
        # Show header preview
        print("Header (first 16 bytes):")
        print(" ".join(f"{b:02x}" for b in header[:16]))
        
        # Save the combined file
        with open("dtb_with_header.bin", "wb") as f:
            f.write(dtb_with_header)
        
        print("✅ dtb_with_header.bin created")
        EOF

    - name: Append DTB to LK image
      run: |
        # Find the LK image
        if [ -f "build-k65v1_64_bsp/lk-dtb.img" ]; then
          LK_IMAGE="build-k65v1_64_bsp/lk-dtb.img"
        elif [ -f "build-k65v1_64_bsp/lk.img" ]; then
          LK_IMAGE="build-k65v1_64_bsp/lk.img"
        else
          echo "❌ No LK image found!"
          exit 1
        fi
        
        echo "Using LK image: $LK_IMAGE"
        echo "Before append:"
        ls -lh $LK_IMAGE
        
        # Backup original
        cp $LK_IMAGE ${LK_IMAGE}.backup
        
        # Append DTB with header
        cat dtb_with_header.bin >> $LK_IMAGE
        
        echo "After append:"
        ls -lh $LK_IMAGE
        
        echo "✅ DTB appended successfully!"

    - name: Verify LK image
      run: |
        if [ -f "build-k65v1_64_bsp/lk-dtb.img" ]; then
          LK_IMAGE="build-k65v1_64_bsp/lk-dtb.img"
        else
          LK_IMAGE="build-k65v1_64_bsp/lk.img"
        fi
        
        echo "=== Verification ==="
        echo "File size:"
        ls -lh $LK_IMAGE
        
        echo ""
        echo "First 32 bytes (should start with 88 16 88 58):"
        hexdump -C $LK_IMAGE | head -3
        
        echo ""
        echo "Checking for LK magic number in the file:"
        if hexdump -C $LK_IMAGE | grep -q "88 16 88 58"; then
          echo "✅ LK magic number found!"
        else
          echo "⚠️ LK magic number not found!"
        fi
        
        echo ""
        echo "Last 64 bytes (DTB should end here):"
        tail -c 64 $LK_IMAGE | hexdump -C

    - name: Upload LK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lk-build-output
        path: |
          build-k65v1_64_bsp/lk-dtb.img
          build-k65v1_64_bsp/lk.img
          build-k65v1_64_bsp/lk-verified.img
          build-k65v1_64_bsp/*.backup
          dtb_with_header.bin
