name: Build LK Bootloader for Realme C21

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lk-build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout sources
      uses: actions/checkout@v4

    - name: Install Python 2
      run: |
        sudo apt-get update
        sudo apt-get install -y python2
        sudo ln -s /usr/bin/python2 /usr/local/bin/python
        python --version

    - name: Cache GCC toolchain
      id: cache-gcc
      uses: actions/cache@v4
      with:
        path: ~/gcc-toolchain
        key: gcc-toolchain

    - name: Download GCC toolchain
      if: steps.cache-gcc.outputs.cache-hit != 'true'
      run: |
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 ~/gcc-toolchain
        cd ~/gcc-toolchain
        git checkout e9b2ab0932573a0ca90cad11ab75d9619f19c458

    - name: Build LK
      run: |
        export python=python2
        TOOLCHAIN_PREFIX=~/gcc-toolchain/bin/arm-linux-androideabi- make k65v1_64_bsp

    - name: Show build output
      run: ls -lh build-k65v1_64_bsp/

    - name: Create dtb.cfg
      run: |
        echo "NAME = lk_main_dtb" > dtb.cfg
        cat dtb.cfg

    - name: Create DTB partition with mkimage
      run: |
        chmod +x scripts/mkimage
        ./scripts/mkimage dtb/realme_c21_lk.dtb dtb.cfg > dtb_partition.bin
        ls -lh dtb_partition.bin

    - name: Create LK partition with mkimage
      run: |
        # Create config for LK partition
        echo "NAME = lk" > lk.cfg
        
        # Create LK partition
        ./scripts/mkimage build-k65v1_64_bsp/lk.img lk.cfg > lk_partition.bin
        ls -lh lk_partition.bin

    - name: Combine both partitions (MediaTek format)
      run: |
        # MediaTek format: [Partition1] + [Partition2]
        cat lk_partition.bin dtb_partition.bin > build-k65v1_64_bsp/lk_final.img
        
        echo "Final image created:"
        ls -lh build-k65v1_64_bsp/lk_final.img

    - name: Verify
      run: |
        echo "=== Verification ==="
        echo "First 32 bytes:"
        hexdump -C build-k65v1_64_bsp/lk_final.img | head -3
        echo ""
        echo "Searching for 'lk_main_dtb':"
        strings build-k65v1_64_bsp/lk_final.img | grep "lk" | head -10

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: realme-c21-lk-final
        path: |
          build-k65v1_64_bsp/lk_final.img
          lk_partition.bin
          dtb_partition.bin
