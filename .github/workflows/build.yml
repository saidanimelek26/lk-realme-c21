name: Build LK Bootloader for Realme C21

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lk-build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout sources
      uses: actions/checkout@v4

    - name: Install Python 2
      run: |
        sudo apt-get update
        sudo apt-get install -y python2
        sudo ln -s /usr/bin/python2 /usr/local/bin/python
        python --version

    - name: Cache GCC toolchain
      id: cache-gcc
      uses: actions/cache@v4
      with:
        path: ~/gcc-toolchain
        key: gcc-toolchain

    - name: Download GCC toolchain
      if: steps.cache-gcc.outputs.cache-hit != 'true'
      run: |
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 ~/gcc-toolchain
        cd ~/gcc-toolchain
        git checkout e9b2ab0932573a0ca90cad11ab75d9619f19c458

    - name: Build LK for Realme C21
      run: |
        export python=python2
        TOOLCHAIN_PREFIX=~/gcc-toolchain/bin/arm-linux-androideabi- make k65v1_64_bsp

    - name: Show build output
      run: ls -lh build-k65v1_64_bsp/

    - name: Prepare Realme C21 DTB with correct size
      run: |
        DTB_FILE="dtb/realme_c21_lk.dtb"
        
        # Correct DTB size from original working LK (140563 bytes)
        CORRECT_DTB_SIZE=140563
        
        # Check current DTB size
        if [ -f "$DTB_FILE" ]; then
          CURRENT_SIZE=$(stat -c%s "$DTB_FILE")
          echo "Current DTB size: $CURRENT_SIZE bytes"
          echo "Target DTB size: $CORRECT_DTB_SIZE bytes"
          
          # Pad or truncate to correct size
          if [ $CURRENT_SIZE -lt $CORRECT_DTB_SIZE ]; then
            echo "Padding DTB to correct size..."
            dd if=/dev/zero bs=1 count=$((CORRECT_DTB_SIZE - CURRENT_SIZE)) 2>/dev/null >> "$DTB_FILE"
          elif [ $CURRENT_SIZE -gt $CORRECT_DTB_SIZE ]; then
            echo "Truncating DTB to correct size..."
            dd if="$DTB_FILE" of="$DTB_FILE.tmp" bs=1 count=$CORRECT_DTB_SIZE 2>/dev/null
            mv "$DTB_FILE.tmp" "$DTB_FILE"
          fi
          
          NEW_SIZE=$(stat -c%s "$DTB_FILE")
          echo "Final DTB size: $NEW_SIZE bytes"
        else
          echo "ERROR: DTB file not found at $DTB_FILE"
          exit 1
        fi
        
        # Create MediaTek header (32 bytes)
        printf "lk_main_dtb" > header.bin
        dd if=/dev/zero bs=1 count=32 2>/dev/null >> header.bin
        dd if=header.bin of=mtk_header.bin bs=1 count=32 2>/dev/null
        
        # Combine header + DTB
        cat mtk_header.bin "$DTB_FILE" > dtb_with_header.bin
        
        echo "DTB with header size:"
        ls -lh dtb_with_header.bin

    - name: Append DTB to LK image
      run: |
        # Find the LK image
        if [ -f "build-k65v1_64_bsp/lk-dtb.img" ]; then
          LK_IMAGE="build-k65v1_64_bsp/lk-dtb.img"
        elif [ -f "build-k65v1_64_bsp/lk.img" ]; then
          LK_IMAGE="build-k65v1_64_bsp/lk.img"
        else
          echo "ERROR: No LK image found!"
          exit 1
        fi
        
        echo "Using LK image: $LK_IMAGE"
        echo "Before append:"
        ls -lh $LK_IMAGE
        
        # Backup original
        cp $LK_IMAGE ${LK_IMAGE}.backup
        
        # Append DTB with header
        cat dtb_with_header.bin >> $LK_IMAGE
        
        echo "After append:"
        ls -lh $LK_IMAGE
        
        # Verify header at end of file
        echo "Verifying last 64 bytes:"
        tail -c 64 $LK_IMAGE | hexdump -C
        
        if tail -c 64 $LK_IMAGE | grep -q "lk_main_dtb"; then
          echo "✅ SUCCESS: MediaTek header found at end of file!"
        else
          echo "⚠️ WARNING: Header not found at end of file"
        fi

    - name: Verify final LK image
      run: |
        if [ -f "build-k65v1_64_bsp/lk-dtb.img" ]; then
          LK_IMAGE="build-k65v1_64_bsp/lk-dtb.img"
        else
          LK_IMAGE="build-k65v1_64_bsp/lk.img"
        fi
        
        echo "=== Final LK Image Information ==="
        echo "File: $LK_IMAGE"
        echo "Size: $(stat -c%s $LK_IMAGE) bytes"
        echo ""
        echo "First 32 bytes (LK header - should start with 88 16 88 58):"
        hexdump -C $LK_IMAGE | head -2
        echo ""
        echo "Last 64 bytes (DTB trailer - should contain 'lk_main_dtb'):"
        tail -c 64 $LK_IMAGE | hexdump -C

    - name: Upload LK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: realme-c21-lk-with-dtb
        path: |
          build-k65v1_64_bsp/lk-dtb.img
          build-k65v1_64_bsp/lk.img
          build-k65v1_64_bsp/lk-verified.img
          build-k65v1_64_bsp/*.backup
          dtb_with_header.bin
