name: Build LK Bootloader for Realme C21 (with mkimage)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lk-build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout sources
      uses: actions/checkout@v4

    - name: Install Python 2 & U-Boot tools
      run: |
        sudo apt-get update
        sudo apt-get install -y python2 u-boot-tools
        sudo ln -s /usr/bin/python2 /usr/local/bin/python
        python --version

    - name: Cache GCC toolchain
      id: cache-gcc
      uses: actions/cache@v4
      with:
        path: ~/gcc-toolchain
        key: gcc-toolchain

    - name: Download GCC toolchain
      if: steps.cache-gcc.outputs.cache-hit != 'true'
      run: |
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 ~/gcc-toolchain
        cd ~/gcc-toolchain
        git checkout e9b2ab0932573a0ca90cad11ab75d9619f19c458

    - name: Build LK
      run: |
        export python=python2
        TOOLCHAIN_PREFIX=~/gcc-toolchain/bin/arm-linux-androideabi- make k65v1_64_bsp

    - name: Show build output
      run: ls -lh build-k65v1_64_bsp/

    - name: Create Image Tree Source (ITS) file
      run: |
        cat > lk.its << 'EOF'
        /dts-v1/;

        / {
            description = "LK Bootloader with DTB";
            #address-cells = <1>;

            images {
                lk {
                    description = "Little Kernel Bootloader";
                    data = /incbin/("build-k65v1_64_bsp/lk.img");
                    type = "firmware";
                    arch = "arm";
                    os = "u-boot";
                    compression = "none";
                    load = <0x48000000>;
                    entry = <0x48000000>;
                };
                fdt {
                    description = "Device Tree Blob";
                    data = /incbin/("dtb/realme_c21_lk.dtb");
                    type = "flat_dt";
                    arch = "arm";
                    compression = "none";
                    load = <0xffffffff>;
                };
            };

            configurations {
                default = "config";
                config {
                    description = "LK with DTB";
                    firmware = "lk";
                    fdt = "fdt";
                };
            };
        };
        EOF
        echo "✅ ITS file created:"
        cat lk.its

    - name: Build final LK image with mkimage
      run: |
        # Use mkimage to create the final FIT image
        mkimage -f lk.its -A arm -O linux -T firmware build-k65v1_64_bsp/lk_final.img
        
        echo "✅ Final image created successfully!"
        ls -lh build-k65v1_64_bsp/lk_final.img

    - name: Verify the final image
      run: |
        echo "=== Verification of Final Image ==="
        mkimage -l build-k65v1_64_bsp/lk_final.img
        
        echo ""
        echo "Searching for 'lk_main_dtb' in the image:"
        if strings build-k65v1_64_bsp/lk_final.img | grep -q "lk_main_dtb"; then
          echo "✅ 'lk_main_dtb' found!"
        else
          echo "⚠️ 'lk_main_dtb' not found in strings"
        fi

    - name: Upload LK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: realme-c21-lk-final
        path: |
          build-k65v1_64_bsp/lk_final.img
          build-k65v1_64_bsp/lk.img
          build-k65v1_64_bsp/lk-dtb.img
          lk.its
