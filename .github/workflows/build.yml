name: Build LK Bootloader

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lk-build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout sources
      uses: actions/checkout@v4

    - name: Install Python 2
      run: |
        sudo apt-get update
        sudo apt-get install -y python2
        sudo ln -s /usr/bin/python2 /usr/local/bin/python
        python --version

    - name: Install u-boot-tools (for mkimage)
      run: |
        sudo apt-get install -y u-boot-tools
        mkimage -V

    - name: Cache GCC toolchain
      id: cache-gcc
      uses: actions/cache@v4
      with:
        path: ~/gcc-toolchain
        key: gcc-toolchain

    - name: Download GCC toolchain
      if: steps.cache-gcc.outputs.cache-hit != 'true'
      run: |
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 ~/gcc-toolchain
        cd ~/gcc-toolchain
        git checkout e9b2ab0932573a0ca90cad11ab75d9619f19c458

    - name: Create dtb.cfg file
      run: |
        echo "NAME = lk_main_dtb" > dtb.cfg
        cat dtb.cfg

    - name: Check DTB file exists
      run: |
        if [ -f dtb/realme_c21_lk.dtb ]; then
          echo "✅ DTB file found"
          ls -lh dtb/realme_c21_lk.dtb
          hexdump -C dtb/realme_c21_lk.dtb | head -3
        else
          echo "❌ DTB file not found at dtb/realme_c21_lk.dtb"
          echo "Listing dtb folder:"
          ls -la dtb/ || echo "dtb folder does not exist"
          exit 1
        fi

    - name: Create proper MediaTek DTB header using mkimage
      run: |
        # Create DTB with proper U-Boot header
        mkimage -A arm -O linux -T flat_dt -C none -a 0x0 -e 0x0 -d dtb/realme_c21_lk.dtb dtb_with_uboot_header.bin
        
        echo "✅ DTB with U-Boot header created:"
        ls -lh dtb_with_uboot_header.bin
        
        # Show header for verification
        echo "Header preview:"
        hexdump -C dtb_with_uboot_header.bin | head -5

    - name: Build LK
      run: |
        export python=python2
        TOOLCHAIN_PREFIX=~/gcc-toolchain/bin/arm-linux-androideabi- make k65v1_64_bsp

    - name: Show build output
      run: ls -lh build-k65v1_64_bsp/

    - name: Append DTB to lk-dtb.img
      run: |
        LK_IMAGE="build-k65v1_64_bsp/lk-dtb.img"
        
        if [ ! -f "$LK_IMAGE" ]; then
          echo "⚠️ lk-dtb.img not found, trying lk.img"
          LK_IMAGE="build-k65v1_64_bsp/lk.img"
        fi
        
        if [ ! -f "$LK_IMAGE" ]; then
          echo "❌ No LK image found!"
          exit 1
        fi
        
        echo "Using LK image: $LK_IMAGE"
        echo "Before append:"
        ls -lh $LK_IMAGE
        
        # Backup original
        cp $LK_IMAGE ${LK_IMAGE}.backup
        
        # Append DTB with header
        cat dtb_with_uboot_header.bin >> $LK_IMAGE
        
        echo "After append:"
        ls -lh $LK_IMAGE
        
        # Verify magic number at the end
        echo "Checking end of file for magic number:"
        tail -c 64 $LK_IMAGE | hexdump -C
        
        echo "✅ DTB appended successfully!"

    - name: Verify LK image magic numbers
      run: |
        LK_IMAGE="build-k65v1_64_bsp/lk-dtb.img"
        if [ ! -f "$LK_IMAGE" ]; then
          LK_IMAGE="build-k65v1_64_bsp/lk.img"
        fi
        
        echo "=== Verifying LK image headers ==="
        echo "First 32 bytes (should start with 88 16 88 58):"
        hexdump -C $LK_IMAGE | head -3
        
        echo ""
        echo "Looking for second magic number (should be 88 16 88 58 at DTB offset):"
        # Search for magic number pattern in the file
        hexdump -C $LK_IMAGE | grep "88 16 88 58" || echo "⚠️ Magic number pattern not found - DTB may not be properly appended"

    - name: Upload LK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: lk-with-dtb
        path: |
          build-k65v1_64_bsp/lk-dtb.img
          build-k65v1_64_bsp/lk.img
          build-k65v1_64_bsp/lk-verified.img
          build-k65v1_64_bsp/lk-dtb.img.backup
          build-k65v1_64_bsp/lk.img.backup
