name: Build LK Bootloader for Realme C21

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lk-build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout sources
      uses: actions/checkout@v4

    - name: Install Python 2
      run: |
        sudo apt-get update
        sudo apt-get install -y python2
        sudo ln -s /usr/bin/python2 /usr/local/bin/python
        python --version

    - name: Cache GCC toolchain
      id: cache-gcc
      uses: actions/cache@v4
      with:
        path: ~/gcc-toolchain
        key: gcc-toolchain

    - name: Download GCC toolchain
      if: steps.cache-gcc.outputs.cache-hit != 'true'
      run: |
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 ~/gcc-toolchain
        cd ~/gcc-toolchain
        git checkout e9b2ab0932573a0ca90cad11ab75d9619f19c458

    - name: Build LK
      run: |
        export python=python2
        TOOLCHAIN_PREFIX=~/gcc-toolchain/bin/arm-linux-androideabi- make k65v1_64_bsp

    - name: Show build output
      run: ls -lh build-k65v1_64_bsp/

    - name: Create dtb.cfg file
      run: |
        echo "NAME = lk_main_dtb" > dtb.cfg
        cat dtb.cfg

    - name: Create DTB with MediaTek header using scripts/mkimage
      run: |
        chmod +x scripts/mkimage
        ./scripts/mkimage dtb/realme_c21_lk.dtb dtb.cfg > dtb_with_header.bin
        echo "DTB with header created:"
        ls -lh dtb_with_header.bin

    - name: Combine LK and DTB (CORRECT MEDIATEK FORMAT)
      run: |
        # The correct MediaTek format is simple concatenation:
        # [lk.img] + [dtb_with_header.bin]
        
        cat build-k65v1_64_bsp/lk.img dtb_with_header.bin > build-k65v1_64_bsp/lk_final.img
        
        echo "Final image created:"
        ls -lh build-k65v1_64_bsp/lk_final.img

    - name: Verify the final image
      run: |
        echo "=== Verification ==="
        
        # Check LK magic number at start
        echo "First 32 bytes (should be 88 16 88 58):"
        hexdump -C build-k65v1_64_bsp/lk_final.img | head -3
        
        # Check for lk_main_dtb header in the file
        echo ""
        echo "Searching for 'lk_main_dtb' header:"
        if strings build-k65v1_64_bsp/lk_final.img | grep -q "lk_main_dtb"; then
          echo "✅ 'lk_main_dtb' found in image"
        else
          echo "❌ 'lk_main_dtb' NOT found"
        fi
        
        # Show file size breakdown
        echo ""
        echo "File size breakdown:"
        LK_SIZE=$(stat -c%s build-k65v1_64_bsp/lk.img)
        DTB_SIZE=$(stat -c%s dtb_with_header.bin)
        FINAL_SIZE=$(stat -c%s build-k65v1_64_bsp/lk_final.img)
        echo "  lk.img: $LK_SIZE bytes"
        echo "  dtb_with_header.bin: $DTB_SIZE bytes"
        echo "  lk_final.img: $FINAL_SIZE bytes"

    - name: Upload LK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: realme-c21-lk-final
        path: |
          build-k65v1_64_bsp/lk_final.img
          build-k65v1_64_bsp/lk.img
          build-k65v1_64_bsp/lk-dtb.img
          dtb_with_header.bin
