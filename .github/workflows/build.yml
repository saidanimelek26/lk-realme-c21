name: Build LK Bootloader for Realme C21

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lk-build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout sources
      uses: actions/checkout@v4

    - name: Install Python 2
      run: |
        sudo apt-get update
        sudo apt-get install -y python2
        sudo ln -s /usr/bin/python2 /usr/local/bin/python
        python --version

    - name: Cache GCC toolchain
      id: cache-gcc
      uses: actions/cache@v4
      with:
        path: ~/gcc-toolchain
        key: gcc-toolchain

    - name: Download GCC toolchain
      if: steps.cache-gcc.outputs.cache-hit != 'true'
      run: |
        git clone https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 ~/gcc-toolchain
        cd ~/gcc-toolchain
        git checkout e9b2ab0932573a0ca90cad11ab75d9619f19c458

    - name: Build LK
      run: |
        export python=python2
        TOOLCHAIN_PREFIX=~/gcc-toolchain/bin/arm-linux-androideabi- make k65v1_64_bsp

    - name: Show build output
      run: ls -lh build-k65v1_64_bsp/

    - name: Create mkimage config file for full image
      run: |
        echo "# LK main image configuration" > full_image.cfg
        echo "IMAGE = lk" >> full_image.cfg
        echo "NAME = lk" >> full_image.cfg
        echo "" >> full_image.cfg
        echo "# DTB partition configuration" >> full_image.cfg
        echo "IMAGE = dtb/realme_c21_lk.dtb" >> full_image.cfg
        echo "NAME = lk_main_dtb" >> full_image.cfg
        
        echo "Config file created:"
        cat full_image.cfg

    - name: Build full LK image with mkimage
      run: |
        # Make mkimage executable
        chmod +x scripts/mkimage
        
        # Go to build directory
        cd build-k65v1_64_bsp
        
        # Create the full image with both partitions
        echo "Creating full LK image with mkimage..."
        ../scripts/mkimage lk.img ../full_image.cfg > lk_full.img
        
        echo "Full image created successfully!"
        ls -lh lk_full.img
        
        cd ..

    - name: Verify the full image
      run: |
        echo "=== Verification ==="
        
        # Check file size
        echo "File size:"
        ls -lh build-k65v1_64_bsp/lk_full.img
        
        # Check for LK magic number at start
        echo ""
        echo "First 32 bytes (should start with 88 16 88 58):"
        hexdump -C build-k65v1_64_bsp/lk_full.img | head -3
        
        # Check for dtb partition name in the file
        echo ""
        echo "Searching for 'lk_main_dtb' in the image:"
        if strings build-k65v1_64_bsp/lk_full.img | grep -q "lk_main_dtb"; then
          echo "✅ 'lk_main_dtb' found successfully!"
          strings build-k65v1_64_bsp/lk_full.img | grep "lk_main_dtb"
        else
          echo "❌ 'lk_main_dtb' not found in image"
        fi

    - name: Create flashable copies
      run: |
        # Create copies with standard names
        cp build-k65v1_64_bsp/lk_full.img build-k65v1_64_bsp/lk_final.img
        cp build-k65v1_64_bsp/lk_full.img build-k65v1_64_bsp/lk-dtb.img
        
        echo "Flashable images created:"
        ls -lh build-k65v1_64_bsp/lk_final.img
        ls -lh build-k65v1_64_bsp/lk-dtb.img

    - name: Upload LK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: realme-c21-lk-full
        path: |
          build-k65v1_64_bsp/lk_full.img
          build-k65v1_64_bsp/lk_final.img
          build-k65v1_64_bsp/lk-dtb.img
          build-k65v1_64_bsp/lk.img
          build-k65v1_64_bsp/lk-verified.img
          full_image.cfg
